<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sneakers Card</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f5f5;
      font-family: Arial, Helvetica, sans-serif;
      padding: 40px;
    }

    .product-card {
      background-color: #fff;
      width: 330px;
      margin: 0 auto;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #e0e0e0;
      box-shadow: 0 10px 20px rgb(0 0 0 / 0.1);
    }

    .product-image {
      width: 100%;
      height: 220px;
      overflow: hidden;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-category {
      font-size: 12px;
      color: #06c;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .product-title {
      font-size: 22px;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    .product-description {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }

    .price-section {
      margin-bottom: 20px;
    }

    .price-section .price {
      font-size: 26px;
      color: #000;
      font-weight: bold;
    }

    .price-section .original-price {
      font-size: 15px;
      color: #999;
      text-decoration: line-through;
      margin-left: 8px;
    }

    .size-options-wrapper {
      border: none;
    }

    .size-label-text {
      font-size: 13px;
      color: #333;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .size-options {
      margin-bottom: 25px;
    }

    .size-options input[type="radio"] {
      display: none;
    }

    .size-options label {
      display: inline-block;
      width: 44px;
      height: 44px;
      border: 2px solid #eee;
      text-align: center;
      line-height: 40px;
      margin-right: 8px;
      font-weight: bold;
      color: #555;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.3s ease;
    }

    .size-options input[type="radio"]:checked+label {
      background-color: #000;
      border-color: #000;
      color: #eaeaea;
    }

    .buy-button {
      width: 100%;
      padding: 16px;
      background-color: #000;
      color: white;
      border: none;
      border-radius: 10px;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .buy-button:hover {
      background-color: #333;
    }
  </style>
</head>

<body>
  <article class="product-card">
    <figure class="product-image">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=600&auto=format&fit=crop"
        alt="Sneakers Nike Red">
    </figure>

    <p class="product-category">Nike Sportswear</p>
    <h3 class="product-title">Air Max Essential</h3>

    <p class="product-description">Nike Air Max Essential adalah sepatu yang dibuat dengan desain yang minimalis namun
      tetap menampilkan ciri khas Nike Air Max.</p>

    <div class="price-section">
      <span class="price">IDR 1,899,000</span>
      <del class="original-price">IDR 2,299,000</del>
    </div>

    <form action="">
      <fieldset class="size-options-wrapper">
        <legend class="size-label-text">Pilih Ukuran (US):</legend>
        <div class="size-options">
          <input type="radio" name="size" id="s8" value="8">
          <label for="s8">8</label>

          <input type="radio" name="size" id="s9" value="9">
          <label for="s9">9</label>

          <input type="radio" name="size" id="s10" value="10">
          <label for="s10">10</label>

          <input type="radio" name="size" id="s11" value="11">
          <label for="s11">11</label>

          <input type="radio" name="size" id="s12" value="12">
          <label for="s12">12</label>
        </div>
      </fieldset>

      <button class="buy-button" type="submit">Tambahkan ke Keranjang</button>
    </form>
  </article>
</body>

</html>
