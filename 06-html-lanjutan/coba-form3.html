<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select & Textarea</title>
</head>

<body>
  <form>
    <h3>Pilih Kota:</h3>
    <select name="kota" id="kota">
      <option>-- Pilih salah satu --</option>
      <option value="bdg" selected>Bandung</option>
      <option value="jkt">Jakarta</option>
      <option value="bgr">Bogor</option>
      <option value="sby">Surabaya</option>
      <option value="mdn">Medan</option>
    </select>
    <br>

    <h3>About Me:</h3>
    <textarea name="about" id="about" cols="50" rows="10" placeholder="isi data diri anda.."></textarea>

    <br><br>

    <button type="submit">Kirim!</button>
  </form>
</body>

</html>
