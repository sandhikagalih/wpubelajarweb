<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coba Elemen Form</title>
</head>

<body>
  <h1>Contoh elemen-elemen form pada HTML</h1>

  <form>
    <label for="nama">Nama:
      <input type="text" name="nama" id="nama" placeholder="Masukkan nama">
    </label>
    <br>

    <label for="password">Password:
      <input type="password" name="password" id="password">
    </label>
    <br>

    <label for="email">Email:
      <input type="email" name="email" id="email">
    </label>
    <br>

    <label for="angka">Angka:
      <input type="number" name="number" id="number" min="0" max="100" step="5">
    </label>
    <br>

    <label for="tanggal">Tanggal:
      <input type="date" name="tanggal" id="tanggal">
    </label>
    <br>

    <label for="warna">Pilih Warna:
      <input type="color" name="warna" id="warna">
    </label>

    <br>
    <button type="submit">Kirim!</button>
  </form>
</body>

</html>
