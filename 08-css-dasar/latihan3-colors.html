<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Quote Galau</title>
  <style>
    body {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: #f8f8ff;
      text-align: center;
      background-color: #0F172A;
    }

    h1 {
      font-size: 48px;
      text-transform: uppercase;
      font-style: italic;
      letter-spacing: 10px;
      text-decoration: underline;
      text-decoration-style: wavy;
      text-decoration-color: #374460;
      text-shadow: 5px 5px 0 rgb(215 215 215 / 10%);
      color: #38BAF4;
    }

    .quote {
      font-size: 22px;
      line-height: 2.2;
      word-spacing: 5px;
    }

    span {
      color: crimson;
      text-decoration: line-through;
    }

    .credit {
      font-size: 12px;
      letter-spacing: 2px;
      color: rgb(151 151 151 / 70%);
      font-weight: normal;
    }
  </style>
</head>

<body>

  <h1>fase runtuh</h1>

  <p class="quote">
    "Tak perlu khawatir, ku hanya <span>terluka</span>. <br>
    Terbiasa tuk pura-pura tertawa. <br>
    Namun bolehkah sekali saja ku menangis? <br>
    Sebelum kembali membohongi diri."
  </p>

  <p class="credit">— feby putri feat. fiersa besari</p>

</body>

</html>
